# Site menu. Edit this file, then run: make menu
#
# Each item is one line:        - Title: destination
# A submenu is a title with an indented list under it instead of a
# destination. Submenus can nest as deep as you like, the menu system
# handles placement automatically.
# The special destination "soon" makes a grayed-out unclickable
# placeholder with a "coming soon" tooltip.
# If a title or destination contains a colon, wrap it in quotes.
#
# Columns (desktop submenus only): give an item a col number to place it
# in that column of its panel. Items sharing a col stack in file order.
# Without col everything goes in column 1. Mobile ignores columns and
# keeps the flat file order. Both of these forms work:
#   - Download (PDF): {dest: Mere_Catholicity.pdf, col: 2}
#   - Extras:
#       col: 2
#       items:
#         - Errata: errata.html

- About: index.html
- Books:
    - Mere Catholicity:
        - Read online (HTML): book.html
        - Download (PDF): Mere_Catholicity.pdf
        - Logos & Verbum: logos.html
        - Paperback (soon): soon
        - Kindle (soon): soon
- Resources: resources.html
- Contact: contact.html
